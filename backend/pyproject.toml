[tool.mypy]
strict = true
python_version = "3.11"

[[tool.mypy.overrides]]
module = "apscheduler.*"
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "SIM105", "SIM102"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
